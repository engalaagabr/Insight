name: Build and deploy Python app to Azure Web App - insight-backend-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ✅ FIXED: install from backend folder
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      # ✅ Upload ONLY backend (clean deployment)
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4C3F24B9F80A4E4C97C0F830CC2BC318 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F4258D20EFBC4294999FF7B572316E93 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2B24A4C3980B4E57BE3C4B983CB1A0EF }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: insight-backend-app
          slot-name: Production
